# Lima auto-selects the image matching host architecture
images:
  - location: "https://download.rockylinux.org/pub/rocky/9.8/images/aarch64/Rocky-9-GenericCloud-Base-9.8-20260525.0.aarch64.qcow2"
    arch: aarch64
    digest: "sha256:24692a444f1f0b8bb95375c38c8b43f8099a115347623691be2c330b40c8a1fe"
  - location: "https://download.rockylinux.org/pub/rocky/9.8/images/x86_64/Rocky-9-GenericCloud-Base-9.8-20260525.0.x86_64.qcow2"
    arch: x86_64
    digest: "sha256:92c206cc6f790c61583247eefe87890f8828420662c17cacf247cec78ab4eec8"

# Secrets are injected at create time via --param (sourced from .env), not stored here
param:
  MMS_GROUP_ID: ""
  MMS_API_KEY: ""

cpus: 1
memory: "2GiB"
disk: "20GiB"

mounts: []

containerd:
  system: false
  user: false

networks:
  - lima: user-v2

provision:
  - mode: data
    path: /root/automation-agent.config.staged
    content: |
      mmsBaseUrl=http://host.lima.internal:8080
      mmsGroupId={{ .Param.MMS_GROUP_ID }}
      mmsApiKey={{ .Param.MMS_API_KEY }}
    owner: root:root
    permissions: "0600"
  - mode: system
    file: provision-agent.sh
